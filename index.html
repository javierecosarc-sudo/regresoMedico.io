<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Pacientes - Producción</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 28px;
        }

        .status {
            padding: 12px 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 600;
        }

        .status.connected {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .status.disconnected {
            background: #ffebee;
            color: #c62828;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-bottom: 25px;
        }

        .form-grid.full {
            grid-template-columns: 1fr;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 600;
            color: #444;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input[type="text"],
        input[type="number"],
        input[type="date"],
        input[type="tel"],
        select,
        textarea {
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        input[type="date"]:focus,
        input[type="tel"]:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-section {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        button {
            padding: 14px 35px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-reset {
            background: #f5f5f5;
            color: #666;
        }

        .btn-reset:hover {
            background: #e8e8e8;
        }

        .btn-download {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            color: white;
        }

        .btn-download:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(76, 175, 80, 0.3);
        }

        .btn-download:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .message {
            display: none;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            text-align: center;
            animation: slideIn 0.3s ease;
        }

        .message.success {
            background: #4caf50;
            color: white;
        }

        .message.error {
            background: #f44336;
            color: white;
        }

        .message.info {
            background: #2196F3;
            color: white;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .record-count {
            text-align: center;
            color: #666;
            margin-top: 20px;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }

            .container {
                padding: 25px;
            }

            h1 {
                font-size: 22px;
            }

            .button-group {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 Formulario de Ingreso de Pacientes</h1>

        <div class="status disconnected" id="connectionStatus">
            ⚠️ Conectando a la base de datos...
        </div>

        <div class="message success" id="successMessage">
            ✓ Registro guardado correctamente
        </div>

        <div class="message error" id="errorMessage">
            ✗ Error al guardar el registro
        </div>

        <div class="message info" id="infoMessage">
            ℹ️ Cargando datos...
        </div>

        <form id="patientForm">
            <!-- Información Básica -->
            <div class="form-section">
                <h2 class="section-title">Información Básica</h2>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="numero">Nº</label>
                        <input type="number" id="numero" name="numero" placeholder="Ej: 001">
                    </div>
                    <div class="form-group">
                        <label for="nombre">Nombre</label>
                        <input type="text" id="nombre" name="nombre" placeholder="Nombre completo" required>
                    </div>
                    <div class="form-group">
                        <label for="edad">Edad</label>
                        <input type="text" id="edad" name="edad" placeholder="Ej: 5 años 3 meses 15 días">
                    </div>
                    <div class="form-group">
                        <label for="dni">DNI</label>
                        <input type="text" id="dni" name="dni" placeholder="Ej: 12345678">
                    </div>
                </div>
            </div>

            <!-- Información Clínica -->
            <div class="form-section">
                <h2 class="section-title">Información Clínica</h2>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="hcl">HCL (Historia Clínica)</label>
                        <input type="text" id="hcl" name="hcl" placeholder="Nº de historia clínica">
                    </div>
                    <div class="form-group">
                        <label for="hb">HB (Hemoglobina)</label>
                        <input type="number" id="hb" name="hb" step="0.1" placeholder="Ej: 14.5 g/dL">
                    </div>
                    <div class="form-group">
                        <label for="fi">FI (Fecha de Inicio)</label>
                        <input type="date" id="fi" name="fi">
                    </div>
                    <div class="form-group">
                        <label for="alta">ALTA</label>
                        <input type="date" id="alta" name="alta">
                    </div>
                    <div class="form-group">
                        <label for="telemonitoreo">Telemonitoreo</label>
                        <input type="date" id="telemonitoreo" name="telemonitoreo">
                    </div>
                </div>
            </div>

            <!-- Diagnósticos -->
            <div class="form-section">
                <h2 class="section-title">Diagnósticos</h2>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="dx1">DX 1 (Diagnóstico Principal)</label>
                        <input type="text" id="dx1" name="dx1" placeholder="Seleccionar o agregar..." list="dx-list">
                    </div>
                    <div class="form-group">
                        <label for="dx2">DX 2 (Diagnóstico Secundario)</label>
                        <input type="text" id="dx2" name="dx2" placeholder="Seleccionar o agregar..." list="dx-list">
                    </div>
                    <div class="form-group">
                        <label for="dx3">DX 3 (Diagnóstico Terciario)</label>
                        <input type="text" id="dx3" name="dx3" placeholder="Seleccionar o agregar..." list="dx-list">
                    </div>
                </div>
                <datalist id="dx-list">
                    <option value="SEPSIS"></option>
                    <option value="RINOFARINGITIS EDA"></option>
                    <option value="Otitis Media"></option>
                    <option value="Chalazión"></option>
                    <option value="ITU"></option>
                    <option value="Urticaria"></option>
                    <option value="CARBAMATOŠ Edema"></option>
                    <option value="ICTERICIA"></option>
                    <option value="Crisis Asmática EDA"></option>
                    <option value="Otalgía"></option>
                    <option value="Conjuntivitis"></option>
                    <option value="Pielonefritis"></option>
                    <option value="Picadura de Insecto"></option>
                    <option value="ALCALIS"></option>
                    <option value="Disuria"></option>
                    <option value="EDA"></option>
                    <option value="Amigdalitis"></option>
                    <option value="Bronquiolitis"></option>
                    <option value="Crup"></option>
                    <option value="Pancreatitis aguda"></option>
                    <option value="DERMATITIS"></option>
                </datalist>
            </div>

            <!-- Ubicación y Contacto -->
            <div class="form-section">
                <h2 class="section-title">Ubicación y Contacto</h2>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="distrito">Distrito</label>
                        <input type="text" id="distrito" name="distrito" placeholder="Seleccionar o agregar..." list="distritos-list">
                        <datalist id="distritos-list">
                            <option value="El Agustino"></option>
                            <option value="Santa Anita"></option>
                            <option value="SJL"></option>
                            <option value="Ate"></option>
                            <option value="Provincia"></option>
                            <option value="Lima Cercado"></option>
                            <option value="Pachacamac"></option>
                            <option value="La Molina"></option>
                            <option value="La Victoria"></option>
                            <option value="Cieneguilla"></option>
                            <option value="Carabayllo"></option>
                        </datalist>
                    </div>
                    <div class="form-group">
                        <label for="telefono1">Teléfono 1</label>
                        <input type="tel" id="telefono1" name="telefono1" placeholder="Ej: +51 999 999 999">
                    </div>
                    <div class="form-group">
                        <label for="telefono2">Teléfono 2 (Opcional)</label>
                        <input type="tel" id="telefono2" name="telefono2" placeholder="Ej: +51 999 999 999">
                    </div>
                    <div class="form-group full">
                        <label for="direccion">Dirección</label>
                        <textarea id="direccion" name="direccion" placeholder="Dirección completa..."></textarea>
                    </div>
                </div>
            </div>

            <!-- Información Adicional -->
            <div class="form-section">
                <h2 class="section-title">Información Adicional</h2>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="dniMama">DNI Mamá</label>
                        <input type="text" id="dniMama" name="dniMama" placeholder="Ej: 12345678">
                    </div>
                    <div class="form-group full">
                        <label for="pendientes">Pendientes</label>
                        <input type="text" id="pendientes" name="pendientes" placeholder="Ej: seguimiento, pendiente...">
                    </div>
                </div>
            </div>

            <!-- Botones -->
            <div class="button-group">
                <button type="submit" class="btn-submit" id="submitBtn">💾 Guardar</button>
                <button type="reset" class="btn-reset">🔄 Limpiar</button>
                <button type="button" class="btn-download" id="downloadBtn">📊 Descargar Excel</button>
            </div>
        </form>

        <div class="record-count">
            <p id="recordCount">Total de registros: 0</p>
        </div>
    </div>

    <script>
        const { createClient } = window.supabase;
        let supabase = null;

        const form = document.getElementById('patientForm');
        const submitBtn = document.getElementById('submitBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const successMessage = document.getElementById('successMessage');
        const errorMessage = document.getElementById('errorMessage');
        const infoMessage = document.getElementById('infoMessage');
        const connectionStatus = document.getElementById('connectionStatus');
        const recordCount = document.getElementById('recordCount');

        async function loadSupabaseConfig() {
            try {
                const response = await fetch('/api/config');
                if (!response.ok) {
                    const errorData = await response.json().catch(() => null);
                    const message = errorData?.error || 'No se pudo cargar la configuración de Supabase';
                    throw new Error(message);
                }

                const config = await response.json();
                if (!config?.SUPABASE_URL || !config?.SUPABASE_KEY) {
                    throw new Error('Faltan credenciales de Supabase en el servidor');
                }

                supabase = createClient(config.SUPABASE_URL, config.SUPABASE_KEY);
            } catch (err) {
                connectionStatus.className = 'status disconnected';
                connectionStatus.textContent = '✗ Error al cargar configuración de Supabase';
                console.error('Error al cargar configuración de Supabase:', err);
                throw err;
            }
        }

        // Mostrar/ocultar mensajes
        function showMessage(element, text, duration = 4000) {
            element.textContent = text;
            element.style.display = 'block';
            setTimeout(() => {
                element.style.display = 'none';
            }, duration);
        }

        // Verificar conexión
        async function checkConnection() {
            try {
                const { data, error } = await supabase.from('pacientes').select('count', { count: 'exact', head: true });
                if (error) throw error;
                connectionStatus.className = 'status connected';
                connectionStatus.textContent = '✓ Conectado a la base de datos';
                await loadRecordCount();
                return true;
            } catch (err) {
                connectionStatus.className = 'status disconnected';
                connectionStatus.textContent = '✗ Error de conexión - Verifica las credenciales';
                console.error('Error de conexión:', err);
                return false;
            }
        }

        // Cargar cantidad de registros
        async function loadRecordCount() {
            try {
                const { count, error } = await supabase
                    .from('pacientes')
                    .select('*', { count: 'exact', head: true });
                if (!error) {
                    recordCount.textContent = `Total de registros: ${count || 0}`;
                }
            } catch (err) {
                console.error('Error al contar registros:', err);
            }
        }

        // Guardar registro
        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            submitBtn.disabled = true;
            submitBtn.textContent = '⏳ Guardando...';

            try {
                const formData = new FormData(form);
                const data = {
                    numero: formData.get('numero') ? parseInt(formData.get('numero')) : null,
                    nombre: formData.get('nombre'),
                    edad: formData.get('edad'),
                    hcl: formData.get('hcl'),
                    dni: formData.get('dni'),
                    fi: formData.get('fi'),
                    alta: formData.get('alta'),
                    telemonitoreo: formData.get('telemonitoreo'),
                    hb: formData.get('hb') ? parseFloat(formData.get('hb')) : null,
                    pendientes: formData.get('pendientes') || null,
                    distrito: formData.get('distrito'),
                    direccion: formData.get('direccion'),
                    telefono1: formData.get('telefono1'),
                    telefono2: formData.get('telefono2'),
                    dni_mama: formData.get('dniMama'),
                    dx1: formData.get('dx1'),
                    dx2: formData.get('dx2'),
                    dx3: formData.get('dx3')
                };

                const { error } = await supabase.from('pacientes').insert([data]);

                if (error) throw error;

                showMessage(successMessage, '✓ Registro guardado correctamente');
                form.reset();
                await loadRecordCount();
            } catch (err) {
                showMessage(errorMessage, `✗ Error: ${err.message}`);
                console.error('Error al guardar:', err);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '💾 Guardar';
            }
        });

        // Descargar Excel
        downloadBtn.addEventListener('click', async function() {
            downloadBtn.disabled = true;
            downloadBtn.textContent = '⏳ Generando...';

            try {
                const { data, error } = await supabase.from('pacientes').select('*');

                if (error) throw error;

                if (!data || data.length === 0) {
                    showMessage(infoMessage, 'ℹ️ No hay registros para descargar');
                    return;
                }

                // Procesar datos para Excel
                const exportData = data.map(record => ({
                    'Nº': record.numero,
                    'Nombre': record.nombre,
                    'Edad': record.edad,
                    'HCL': record.hcl,
                    'DNI': record.dni,
                    'FI': record.fi,
                    'ALTA': record.alta,
                    'Telemonitoreo': record.telemonitoreo,
                    'HB': record.hb,
                    'Distrito': record.distrito,
                    'Dirección': record.direccion,
                    'Teléfono 1': record.telefono1,
                    'Teléfono 2': record.telefono2,
                    'DNI Mamá': record.dni_mama,
                    'DX 1': record.dx1,
                    'DX 2': record.dx2,
                    'DX 3': record.dx3,
                    'Pendientes': record.pendientes ?? '',
                    'Fecha Registro': record.fecha_registro
                }));

                // Crear workbook
                const worksheet = XLSX.utils.json_to_sheet(exportData);
                const workbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(workbook, worksheet, 'Pacientes');

                // Ajustar columnas
                const columnWidths = Array(19).fill(null).map(() => ({ wch: 15 }));
                worksheet['!cols'] = columnWidths;

                // Descargar
                const fileName = `pacientes_${new Date().toISOString().slice(0, 10)}.xlsx`;
                XLSX.writeFile(workbook, fileName);

                showMessage(infoMessage, `✓ ${data.length} registros descargados`);
            } catch (err) {
                showMessage(errorMessage, `✗ Error: ${err.message}`);
                console.error('Error al descargar:', err);
            } finally {
                downloadBtn.disabled = false;
                downloadBtn.textContent = '📊 Descargar Excel';
            }
        });

        // Verificar conexión al cargar
        window.addEventListener('load', async () => {
            try {
                await loadSupabaseConfig();
                await checkConnection();
            } catch (err) {
                console.error('No se pudo inicializar Supabase:', err);
            }
        });
    </script>
</body>
</html>
